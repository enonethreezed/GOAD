- name: "Reboot domain controllers first"
  hosts: dc
  ignore_unreachable: yes
  tasks:
    - name: "reboot"
      win_reboot:
        reboot_timeout: 1800
        post_reboot_delay: 120
      ignore_errors: yes

- name: "Reboot member servers after DC is back"
  hosts: domain:!dc
  ignore_unreachable: yes
  tasks:
    - name: "Disable automatic repair to prevent repair loop on reboot"
      win_shell: bcdedit /set "{current}" recoveryenabled no
      ignore_errors: yes
    - name: "reboot"
      win_reboot:
        reboot_timeout: 1800
        post_reboot_delay: 120
      ignore_errors: yes
    - name: "Re-enable automatic repair after successful reboot"
      win_shell: bcdedit /set "{current}" recoveryenabled yes
      ignore_errors: yes
