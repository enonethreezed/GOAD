- name: "Reboot domain controllers first"
  hosts: dc
  ignore_unreachable: yes
  tasks:
    - name: "reboot"
      win_reboot:
        reboot_timeout: 1800
        post_reboot_delay: 300
      ignore_errors: yes

# NOTE: Member server reboot is intentionally skipped here.
# Windows Server 2025 with vTPM on Proxmox/Ludus does not reliably survive
# a graceful Windows shutdown after domain join (the vTPM emulation corrupts
# the disk state, making the VM permanently unbootable even after a hard reset).
# Member servers are already rebooted during ad-members.yml (domain join step),
# so a second reboot here is not required for the lab to be functional.
