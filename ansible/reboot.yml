- name: "Reboot domain controllers first"
  hosts: dc
  ignore_unreachable: yes
  tasks:
    - name: "reboot"
      win_reboot:
        reboot_timeout: 1800
        post_reboot_delay: 300
      ignore_errors: yes

- name: "Reboot member servers after DC is back"
  hosts: domain:!dc
  ignore_unreachable: yes
  tasks:
    - name: "Suspend BitLocker to prevent TPM boot failure after domain join"
      win_shell: |
        $vol = Get-BitLockerVolume -MountPoint 'C:' -ErrorAction SilentlyContinue
        if ($vol -and $vol.ProtectionStatus -eq 'On') {
          Suspend-BitLocker -MountPoint 'C:' -RebootCount 1
          Write-Output "BitLocker suspended for next reboot"
        } else {
          Write-Output "BitLocker not enabled or already suspended"
        }
      ignore_errors: yes
    - name: "Set boot policy to ignore failures (prevent automatic repair loop)"
      win_shell: bcdedit /set "{default}" bootstatuspolicy ignoreallfailures
      ignore_errors: yes
    - name: "Disable automatic repair to prevent repair loop on reboot"
      win_shell: bcdedit /set "{current}" recoveryenabled no
      ignore_errors: yes
    - name: "reboot (fire-and-forget to avoid vTPM boot-lock on Proxmox)"
      win_shell: shutdown /r /t 10 /f
      async: 20
      poll: 0
      ignore_errors: yes
